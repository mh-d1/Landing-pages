<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landing Page Modern</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      display:flex;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
      color:white;
      overflow:hidden;
    }

    .container{
      text-align:center;
      padding:40px;
      border-radius:20px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(10px);
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
      width:90%;
      max-width:700px;
      animation:fadeIn 3s ease;
    }

    h1{
      font-size:3rem;
      margin-bottom:20px;
    }

    p{
      font-size:1.1rem;
      color:#d1d5db;
      margin-bottom:30px;
    }

    .btn{
      display:inline-block;
      padding:14px 28px;
      background:#38bdf8;
      color:white;
      text-decoration:none;
      border-radius:12px;
      transition:0.3s;
      font-weight:bold;
    }

    .btn:hover{
      background:#0ea5e9;
      transform:scale(1.05);
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1 id="title">Welcome To My Landing Page</h1>

    <p>
      Website modern dengan tampilan clean, center layout,
      dan animasi sederhana menggunakan HTML, CSS, dan JavaScript.
    </p>

    <a href="#" class="btn">Mulai Sekarang</a>
  </div>

  <script>
    // Efek ganti teks otomatis
    const title = document.getElementById("title");

    const texts = [
      "Welcome To My Landing Page",
      "Modern Web Experience",
      "Simple & Elegant Design"
    ];

    let index = 0;

    setInterval(() => {
      index = (index + 1) % texts.length;
      title.textContent = texts[index];
    }, 5000);
  </script>

</body>
</html>
